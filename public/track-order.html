<!DOCTYPE html>
<html>
<head>
  <title>Track Order</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to right, #021b14, #0a4d2d);
      color: white;
    }

    .box {
      background: #fff;
      color: black;
      padding: 35px;
      border-radius: 15px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    .status {
      margin: 10px 0 20px;
      font-size: 18px;
      color: #555;
    }

    .step {
      text-align: left;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      background: #f5f5f5;
    }

    .done {
      background: #d4f8e8;
      color: green;
      font-weight: bold;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: black;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Track Your Order</h1>

  <h3 id="orderId"></h3>
  <p class="status" id="orderStatus"></p>

  <div id="step1" class="step">Order Placed</div>
  <div id="step2" class="step">Processing</div>
  <div id="step3" class="step">Shipped</div>
  <div id="step4" class="step">Delivered</div>

  <button class="btn" onclick="goHome()">Back to Home</button>
</div>

<script>
let order = JSON.parse(localStorage.getItem("currentOrder"));

function updateSteps(statusIndex) {
  const steps = ["step1", "step2", "step3", "step4"];

  steps.forEach((step, index) => {
    document.getElementById(step).classList.remove("done");
    if (index <= statusIndex) {
      document.getElementById(step).classList.add("done");
    }
  });
}

function showOrder() {
  if (!order) {
    document.getElementById("orderId").textContent = "No order found";
    return;
  }

  document.getElementById("orderId").textContent = "Order ID: " + order.orderId;

  // Get time difference
  const now = Date.now();
  const orderTime = parseInt(order.orderId.replace("FH",""));
  const diff = (now - orderTime) / 1000; // seconds

  let status = "Order Placed";
  let stepIndex = 0;

  if (diff > 5) {
    status = "Processing";
    stepIndex = 1;
  }
  if (diff > 10) {
    status = "Shipped";
    stepIndex = 2;
  }
  if (diff > 15) {
    status = "Delivered";
    stepIndex = 3;
  }

  document.getElementById("orderStatus").textContent = "Status: " + status;

  updateSteps(stepIndex);
}

function goHome() {
  window.location.href = "next.html";
}

// Auto update every 3 seconds
setInterval(showOrder, 3000);

showOrder();
</script>

</body>
</html>
