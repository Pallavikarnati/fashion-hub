<!DOCTYPE html>
<html>
<head>
  <title>Thank You</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to right, #021b14, #0a4d2d);
      color: white;
    }

    .box {
      text-align: center;
      background: #ffffff;
      color: black;
      padding: 40px;
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .tick {
      font-size: 60px;
      color: green;
    }

    h2 {
      margin-top: 10px;
    }

    p {
      margin: 10px 0 20px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      background: black;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
    }

    .btn:hover {
      background: #333;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="tick">✔</div>
    <h2>Order Placed Successfully!</h2>
    <p>Thank you for shopping with <b>Fashion Hub</b></p>

    <button class="btn" onclick="goTrack()">Track Order</button>
    <button class="btn" onclick="goHome()">Go Home</button>
  </div>

  <script>
    function goTrack() {
      window.location.href = "track-order.html";
    }

    function goHome() {
      window.location.href = "next.html";
    }
  </script>

</body>
</html>
